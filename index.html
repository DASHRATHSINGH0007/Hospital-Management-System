<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased text-slate-700">
    <div class="view-section flex items-center justify-center min-h-screen bg-gray-100">
        <div class="w-full max-w-md p-8 space-y-8 bg-white rounded-2xl shadow-lg">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-gray-800">Hospital Management System</h1>
                <p class="mt-2 text-gray-500">Please select your role to login</p>
            </div>
            <div id="login-options" class="space-y-4">
                <button class="w-full px-4 py-3 font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition-transform transform hover:scale-105" onclick="showLogin('admin')">Admin Login</button>
                <button class="w-full px-4 py-3 font-semibold text-white bg-green-600 rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 transition-transform transform hover:scale-105" onclick="showLogin('doctor')">Doctor Login</button>
                <button class="w-full px-4 py-3 font-semibold text-white bg-purple-600 rounded-lg hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-50 transition-transform transform hover:scale-105" onclick="showLogin('receptionist')">Receptionist Login</button>
            </div>
            <form id="login-form" class="hidden mt-8 space-y-6">
                <h2 id="login-title" class="text-2xl font-semibold text-center text-gray-700">Login</h2>
                <input type="hidden" id="login-role" value="">
                <div class="space-y-4 rounded-md shadow-sm">
                    <div>
                        <input type="text" id="username" class="relative block w-full px-3 py-3 placeholder-gray-500 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Username" required>
                    </div>
                    <div>
                        <input type="password" id="password" class="relative block w-full px-3 py-3 placeholder-gray-500 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Password" required>
                    </div>
                </div>
                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Sign in
                    </button>
                </div>
                <p id="error-message" class="text-sm text-center text-red-500"></p>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
